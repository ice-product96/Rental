{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block nav_clients %}active{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-10">
    <div class="card">
      <div class="card-header">{{ page_title }}</div>
      <div class="card-body">
        <form method="post" id="clientForm">
          {% csrf_token %}
          {% crispy form %}
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleFields() {
  const type = document.querySelector('[name=client_type]').value;
  document.getElementById('individual-fields').style.display = type === 'individual' ? '' : 'none';
  document.getElementById('company-fields').style.display = type === 'company' ? '' : 'none';
}
document.querySelector('[name=client_type]').addEventListener('change', toggleFields);
toggleFields();
</script>
{% endblock %}
